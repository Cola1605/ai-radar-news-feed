name: Update AI Radar news feed

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/build-public-ai-news.mjs
      - run: |
          if git diff --quiet latest.json docs/_posts; then
            echo "No AI news feed changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json docs/_posts
          git commit -m "chore: update AI Radar news feed"
          git push
